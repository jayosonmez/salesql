name: Daily Email Send

on:
  schedule:
    - cron: '0 14 * * *'  # 7:00am PDT (UTC-7). Change to '0 15 * * *' in winter (PST = UTC-8)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary boto3 google-auth google-auth-oauthlib google-api-python-client

      - name: Write Gmail token
        run: echo '${{ secrets.GMAIL_TOKEN }}' > gmail_token.json

      - name: Process Gmail replies
        run: python process_replies.py --poll
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
          GMAIL_TOKEN_FILE: gmail_token.json

      - name: Process bounces and complaints from SQS
        run: python process_bounces.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2

      - name: Sync SES suppression list
        run: python sync_ses_suppressions.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2

      - name: Send emails
        run: python sender.py --send --limit 1000
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
